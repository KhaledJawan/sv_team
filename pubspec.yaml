# README:
# 1) Create a fresh project with: flutter create sv_team
# 2) Replace the generated pubspec.yaml and lib/ directory with these files.
# 3) Run: flutter pub get && flutter run
name: sv_team
description: Internal catering workflow app (Phase 1)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
